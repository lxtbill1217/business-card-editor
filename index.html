<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Link Card Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --card-width: 550px;
            --card-height: 330px;
            --navy-dark: #1C2F45;
            --ice-blue: #AEBECD;
            --premium-beige: #FAF7F2;
        }
        body { font-family: 'Noto Serif JP', serif; background-color: #f0f2f5; margin: 0; padding: 0; color: #333; }

        /* 预览区 - 始终可见 */
        .preview-header {
            background: linear-gradient(180deg, #ffffff 0%, #e5e9ef 100%);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 1px solid #d1d9e6;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .card-perspective { perspective: 2000px; cursor: pointer; }
        .card-inner {
            width: var(--card-width);
            height: var(--card-height);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 30px 60px rgba(28, 47, 69, 0.15);
        }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 1px; overflow: hidden; }
        .card-back-face { transform: rotateY(180deg); }

        .texture {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05; pointer-events: none; mix-blend-mode: overlay; z-index: 5;
        }

        .card-front { background-color: var(--premium-beige); padding: 22px 45px 35px 45px; display: flex; flex-direction: column; justify-content: space-between; }
        .card-back { background-color: var(--navy-dark); padding: 40px; display: flex; flex-direction: column; justify-content: space-between; color: white; text-align: center; }

        .editor-wrapper { max-width: 900px; margin: 40px auto 120px; padding: 0 20px; }
        .editor-section { background: white; border-radius: 20px; padding: 40px; margin-bottom: 30px; border: 1px solid #eef2f6; }
        .section-label { font-size: 15px; font-weight: 700; color: var(--navy-dark); letter-spacing: 2px; margin-bottom: 30px; padding-left: 15px; border-left: 4px solid var(--ice-blue); }

        .input-box { margin-bottom: 20px; }
        .input-box label { display: block; font-size: 13px; font-weight: 600; color: #6a7685; margin-bottom: 8px; }
        .input-box input { width: 100%; padding: 14px 20px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 15px; }

        .upload-card { border: 1px dashed #cbd5e1; padding: 20px; border-radius: 12px; background: #fcfdfe; text-align: center; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .delete-btn { font-size: 11px; color: #94a3b8; margin-top: 8px; cursor: pointer; text-decoration: underline; }

        .export-panel { position: fixed; bottom: 30px; right: 30px; z-index: 2000; }
        .btn-pdf { background: var(--navy-dark); color: white; padding: 16px 36px; border-radius: 12px; font-weight: 600; cursor: pointer; box-shadow: 0 10px 25px rgba(28, 47, 69, 0.3); }

        .f-logo-img { max-height: 60px; max-width: 180px; object-fit: contain; object-position: left bottom; }
        .sdgs-icon { max-height: 42px; max-width: 140px; object-fit: contain; filter: none !important; opacity: 1 !important; }
        .qr-frame { width: 42px; height: 42px; background: white; padding: 3px; border-radius: 2px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .qr-frame img { max-width: 100%; max-height: 100%; }

        #export-shadow-container { position: absolute; left: -9999px; width: var(--card-width); }
        .static-card { width: var(--card-width); height: var(--card-height); position: relative; overflow: hidden; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="preview-header no-print">
        <div class="text-[11px] text-slate-400 mb-4 tracking-[0.3em] font-bold uppercase">Click to Flip / 名刺をタップして反転</div>
        <div class="card-perspective" onclick="flipCard()">
            <div id="card-inner" class="card-inner">
                <div class="card-face card-front" id="view-front"></div>
                <div class="card-face card-back-face card-back" id="view-back"></div>
            </div>
        </div>
    </div>

    <div id="export-shadow-container">
        <div id="capture-front" class="static-card card-front"></div>
        <div id="capture-back" class="static-card card-back"></div>
    </div>

    <main class="editor-wrapper no-print">
        <div class="editor-section">
            <h2 class="section-label">Content / テキスト編集</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-10">
                <div class="input-box"><label>お名前 (漢字)</label><input type="text" id="inp-name" value="金 貞慧" oninput="syncAll()"></div>
                <div class="input-box"><label>ふりがな</label><input type="text" id="inp-kana" value="キン テイケイ" oninput="syncAll()"></div>
                <div class="input-box"><label>お名前 (ローマ字)</label><input type="text" id="inp-en-name" value="Zoey Jin" oninput="syncAll()"></div>
                <div class="input-box"><label>役職 (日本語)</label><input type="text" id="inp-title" value="ブランド品事業部 マネージャー" oninput="syncAll()"></div>
                <div class="input-box"><label>役職 (英語)</label><input type="text" id="inp-en-title" value="LUXURY GOODS DIVISION MANAGER" oninput="syncAll()"></div>
                <div class="input-box"><label>郵便番号</label><input type="text" id="inp-zip" value="〒541-0048" oninput="syncAll()"></div>
                <div class="input-box"><label>所在地 (住所)</label><input type="text" id="inp-address" value="大阪市中央区瓦町一丁目2番12号2階" oninput="syncAll()"></div>
                <div class="input-box"><label>電話番号</label><input type="text" id="inp-tel" value="070-6469-3745" oninput="syncAll()"></div>
                <div class="input-box"><label>メールアドレス</label><input type="text" id="inp-mail" value="zoeyjin@worldlink.jp" oninput="syncAll()"></div>
            </div>
        </div>

        <div class="editor-section">
            <h2 class="section-label">Assets / 画像管理</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="upload-card">
                    <label class="block text-[10px] font-bold text-slate-400 mb-2">表面ロゴ</label>
                    <input type="file" id="f-logo-file" onchange="handleImage(this, 'f-logo')" class="text-xs w-full">
                    <div class="delete-btn" onclick="clearImage('f-logo')">削除</div>
                </div>
                <div class="upload-card">
                    <label class="block text-[10px] font-bold text-slate-400 mb-2">SDGsロゴ</label>
                    <input type="file" id="sdgs-file" onchange="handleImage(this, 'sdgs')" class="text-xs w-full">
                    <div class="delete-btn" onclick="clearImage('sdgs')">削除</div>
                </div>
                <div class="upload-card">
                    <label class="block text-[10px] font-bold text-slate-400 mb-2">WeCom QR</label>
                    <input type="file" id="qr1-file" onchange="handleImage(this, 'qr1')" class="text-xs w-full">
                    <div class="delete-btn" onclick="clearImage('qr1')">削除</div>
                </div>
                <div class="upload-card">
                    <label class="block text-[10px] font-bold text-slate-400 mb-2">Line QR</label>
                    <input type="file" id="qr2-file" onchange="handleImage(this, 'qr2')" class="text-xs w-full">
                    <div class="delete-btn" onclick="clearImage('qr2')">削除</div>
                </div>
            </div>
        </div>
    </main>

    <div class="export-panel no-print">
        <button class="btn-pdf" onclick="exportPDF()">PDF下载 (PDFダウンロード)</button>
    </div>

    <script>
        let assets = { fLogo: null, sdgs: null, qr1: null, qr2: null };

        function flipCard() { document.getElementById('card-inner').classList.toggle('is-flipped'); }

        function handleImage(input, type) {
            if (input.files && input.files[0]) {
                assets[type === 'f-logo' ? 'fLogo' : type] = URL.createObjectURL(input.files[0]);
                syncAll();
            }
        }

        function clearImage(type) {
            assets[type === 'f-logo' ? 'fLogo' : type] = null;
            document.getElementById(`${type}-file`).value = '';
            syncAll();
        }

        function syncAll() {
            const data = {
                name: document.getElementById('inp-name').value,
                kana: document.getElementById('inp-kana').value,
                enName: document.getElementById('inp-en-name').value,
                title: document.getElementById('inp-title').value,
                enTitle: document.getElementById('inp-en-title').value,
                zip: document.getElementById('inp-zip').value,
                address: document.getElementById('inp-address').value,
                tel: document.getElementById('inp-tel').value,
                mail: document.getElementById('inp-mail').value
            };

            const frontHTML = `
                <div class="texture"></div>
                <div class="flex flex-col items-start z-10">
                    <div style="border-bottom: 1.5px solid var(--navy-dark); padding-bottom: 2px; margin-bottom: 4px; display: flex; align-items: flex-end; width: fit-content;">
                        ${assets.fLogo ? `<img src="${assets.fLogo}" class="f-logo-img">` : `<span style="letter-spacing: 0.3em; font-weight: 700; color: var(--navy-dark); font-size: 18px; line-height: 1.2;">WORLD LINK</span>`}
                    </div>
                    <div style="font-size: 9.5px; color: var(--navy-dark); letter-spacing: 0.12em; opacity: 0.8; font-weight: 500;">WORLD LINK 株式会社</div>
                </div>
                <div class="flex flex-col items-start z-10">
                    <div style="font-size: 9px; color: var(--ice-blue); letter-spacing: 0.2em; margin-bottom: 1px; font-weight: 500;">${data.kana}</div>
                    <h1 style="color: var(--navy-dark); font-size: 34px; letter-spacing: 0.2em; font-weight: 700; line-height: 1.1;">${data.name}</h1>
                    <div style="font-size: 14px; color: var(--ice-blue); letter-spacing: 0.15em; margin-top: 6px; font-weight: 400;">${data.enName}</div>
                    <div style="font-size: 11px; color: #475569; margin-top: 22px; letter-spacing: 0.05em; font-weight: 500;">${data.title}</div>
                    <div style="font-size: 8.5px; color: #94a3b8; letter-spacing: 0.1em; margin-top: 3px; text-transform: uppercase;">${data.enTitle}</div>
                </div>
                <div class="flex justify-between items-end border-t border-slate-200 pt-5 z-10 text-[9.5px] text-slate-500">
                    <div class="text-left leading-relaxed">
                        <p>${data.zip}</p><p>${data.address}</p>
                    </div>
                    <div class="text-right leading-relaxed font-medium">
                        <p>TEL: ${data.tel}</p><p>MAIL: ${data.mail}</p>
                    </div>
                </div>
            `;

            const noQR = !assets.qr1 && !assets.qr2;
            const backHTML = `
                <div class="texture"></div>
                <div class="h-6"></div>
                <div class="flex-1 flex flex-col justify-center items-center z-10">
                    <div class="text-[16px] tracking-[0.5em] leading-[2.6] font-[300] text-white/90">
                        世界をつなぎ、<br>価値を創り、<br>
                        <span style="color: var(--ice-blue); font-weight: 500;">美しい未来を拓く！</span>
                    </div>
                </div>
                <div class="flex ${noQR ? 'justify-center' : 'justify-between'} items-end z-10">
                    <div class="flex items-end">${assets.sdgs ? `<img src="${assets.sdgs}" class="sdgs-icon">` : ''}</div>
                    <div class="flex gap-6 pb-1">
                        ${assets.qr1 ? `<div class="flex flex-col items-center gap-1.5"><div class="qr-frame"><img src="${assets.qr1}"></div><span class="text-[6px] text-white/40 uppercase tracking-tighter">Wecom</span></div>` : ''}
                        ${assets.qr2 ? `<div class="flex flex-col items-center gap-1.5"><div class="qr-frame"><img src="${assets.qr2}"></div><span class="text-[6px] text-white/40 uppercase tracking-tighter">Line</span></div>` : ''}
                    </div>
                </div>
            `;

            document.getElementById('view-front').innerHTML = frontHTML;
            document.getElementById('view-back').innerHTML = backHTML;
            document.getElementById('capture-front').innerHTML = frontHTML;
            document.getElementById('capture-back').innerHTML = backHTML;
        }

        async function exportPDF() {
            const { jsPDF } = window.jspdf;
            try {
                const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [91, 55] });
                const opt = { scale: 4, useCORS: true };
                const c1 = await html2canvas(document.getElementById('capture-front'), opt);
                doc.addImage(c1.toDataURL('image/png'), 'PNG', 0, 0, 91, 55);
                doc.addPage([91, 55], 'landscape');
                const c2 = await html2canvas(document.getElementById('capture-back'), opt);
                doc.addImage(c2.toDataURL('image/png'), 'PNG', 0, 0, 91, 55);
                doc.save(`Card_${document.getElementById('inp-name').value}.pdf`);
            } catch (e) { alert("PDF export failed."); }
        }

        window.onload = syncAll;
    </script>
</body>
</html>
